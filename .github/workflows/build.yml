name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: super-dl-windows
            asset_path: dist/super-dl.exe
            asset_name: super-dl.exe
          - os: macos-14
            artifact_name: super-dl-macos-arm64
            asset_path: dist/super-dl-macos-arm64.zip
            asset_name: super-dl-macos-arm64.zip
          - os: ubuntu-latest
            artifact_name: super-dl-linux
            asset_path: dist/super-dl
            asset_name: super-dl-linux

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Linux Qt runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-sync1 libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0

      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Compile translations
        run: |
          pyside6-lupdate super_dl/ui/main_window.py super_dl/ui/about_dialog.py -ts super_dl/resources/i18n/super_dl_en.ts super_dl/resources/i18n/super_dl_es.ts super_dl/resources/i18n/super_dl_fr.ts
          pyside6-lrelease super_dl/resources/i18n/super_dl_en.ts super_dl/resources/i18n/super_dl_es.ts super_dl/resources/i18n/super_dl_fr.ts

      - name: Verify .ts sources are up to date
        if: runner.os == 'Linux'
        shell: bash
        run: git diff --exit-code super_dl/resources/i18n/*.ts || (echo "Run pyside6-lupdate locally and commit the .ts changes"; exit 1)

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest

      - name: Build (PyInstaller)
        run: pyinstaller super_dl.spec --noconfirm

      - name: Package Windows portable as zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path super-dl.exe -DestinationPath super-dl-windows-portable.zip

      - name: Build Windows installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $env:GITHUB_REF -replace '^refs/tags/v', ''
          } else { '0.0.0-dev' }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=$version" installer\super-dl.iss

      - name: Package macOS .app as zip
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r super-dl-macos-arm64.zip super-dl.app
          rm -rf super-dl.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/super-dl-windows-portable.zip
            dist/super-dl-setup-*.exe
            dist/super-dl
            dist/super-dl-macos-arm64.zip
          if-no-files-found: ignore

  release:
    name: GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
